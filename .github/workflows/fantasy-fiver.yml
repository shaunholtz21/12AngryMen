name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Discover year folders
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football:/children"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          YEARS=$(echo "$RESP" | jq -r '.value[]? 
            | select(.folder != null) 
            | select(.name|test("^[0-9]{4}$")) 
            | .name')

          if [ -z "$YEARS" ]; then
            echo "No year folders found under Fantasy Football"
            exit 1
          fi

          echo "$YEARS" > years.txt

      - name: Download Excel files
        run: |
          YEARS=$(cat years.txt)
          for year in $YEARS; do
            echo "Downloading $year..."

            URL='https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/'"$year"'/FF%20-%2012%20Angry%20Men%20%28'"$year"'%29.xlsx:/content'

            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$URL" \
              --output "FF - 12 Angry Men ($year).xlsx"
          done

      - name: Convert Excel to JSON
        run: |
          python - << 'EOF'
          import os, pandas as pd
          import json

          with open("years.txt") as f:
              years = f.read().split()

          fiver_dir = os.path.join("history", "awards", "fantasy-fiver")
          king_east_dir = os.path.join("history", "awards", "king-east")

          os.makedirs(fiver_dir, exist_ok=True)
          os.makedirs(king_east_dir, exist_ok=True)

          for year in years:
              xlsx = f"FF - 12 Angry Men ({year}).xlsx"
              print(f"Processing {xlsx}...")

        # ================================
        # FANTASY FIVER
        # ================================
              df = pd.read_excel(xlsx, sheet_name="Awards - Fantasy Fiver")
              df.to_json(os.path.join(fiver_dir, f"{year}.json"), orient="records")

        # ================================
        # KING OF THE EAST
        # ================================
          try:
            sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
            king_east_winner = sheet.iloc[1, 3]  # D2 = row 1, col 3 (0‑indexed)

            king_json = { "Team": str(king_east_winner) }

            with open(os.path.join(king_east_dir, f"{year}.json"), "w") as f:
                json.dump(king_json, f, indent=2)

              print(f"King of the East JSON written for {year}")

          except Exception as e:
              print(f"Error generating King of the East for {year}: {e}")

          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main