name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          echo "Raw token response:"
          echo "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Discover available year folders in OneDrive
        id: years
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football:/children"
          RESP=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          echo "Raw folder listing:"
          echo "$RESP"

          YEARS=$(echo "$RESP" | jq -r '.value[] | select(.folder != null) | select(.name|test("^[0-9]{4}$")) | .name')

          echo "YEARS FOUND:"
          echo "$YEARS"

          YEARS_JSON=$(printf '%s\n' $YEARS | jq -R . | jq -s .)
          echo "YEARS=$YEARS_JSON" >> $GITHUB_ENV

      - name: Create conversion script
        run: |
          cat << 'EOF' > convert_fiver.py
          import os, json, pandas as pd

          years = json.loads(os.environ["YEARS"])

          for year in years:
              xlsx_name = f"FF - 12 Angry Men ({year}).xlsx"
              print(f"Processing {xlsx_name}...")

              df = pd.read_excel(xlsx_name, sheet_name="Awards - Fantasy Fiver")

              out_dir = os.path.join("history", "awards", "fantasy-fiver")
              os.makedirs(out_dir, exist_ok=True)

              out_path = os.path.join(out_dir, f"{year}.json")
              df.to_json(out_path, orient="records")

              print(f"Saved {out_path}")
          EOF

      - name: Download Excel files for each year
        run: |
          YEARS=$(echo $YEARS | jq -r '.[]')
          for year in $YEARS; do
            echo "Downloading $year..."
            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football/$year/FF - 12 Angry Men ($year).xlsx:/content" \
              --output "FF - 12 Angry Men ($year).xlsx"
          done

      - name: Convert Excel → JSON
        run: python convert_fiver.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
