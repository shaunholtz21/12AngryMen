name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  update-fantasy-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3 python3-pip
          pip3 install openpyxl pandas

      - name: Exchange refresh token for access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}&scope=offline_access Files.Read User.Read&refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}&redirect_uri=http://localhost&grant_type=refresh_token&client_secret=${{ secrets.ONEDRIVE_CLIENT_SECRET }}")

          echo "$RESPONSE" | jq -r '.access_token' > access_token.txt

            - name: Download 2024 and 2025 Excel files
        run: |
          mkdir -p data
          for YEAR in 2024 2025; do
            FILE="FF - 12 Angry Men (${YEAR}).xlsx"
            ENCODED_FILE=$(python3 - <<EOF
import urllib.parse
print(urllib.parse.quote("${FILE}"))
EOF
)
            curl -s -X GET \
              -H "Authorization: Bearer $(cat access_token.txt)" \
              -o "data/${YEAR}.xlsx" \
              "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football/${YEAR}/${ENCODED_FILE}:/content"
          done

      - name: Convert Fantasy Fiver sheets to JSON
        run: |
          mkdir -p history
          python3 <<EOF
import pandas as pd
import json
import os

for year in [2024, 2025]:
    df = pd.read_excel(f"data/{year}.xlsx", sheet_name="Awards - Fantasy Fiver")
    out_dir = f"history/{year}/awards"
    os.makedirs(out_dir, exist_ok=True)
    df.to_json(f"{out_dir}/fantasy-fiver.json", orient="records")
EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
