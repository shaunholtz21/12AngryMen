name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          echo "Raw token response:"
          echo "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Create Python script
        run: |
          cat << 'EOF' > convert_fiver.py
          import os
          import json
          import requests
          import pandas as pd

          ACCESS_TOKEN = os.environ["ACCESS_TOKEN"]

          # 1. List all items in the Fantasy Football folder
          url = "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football:/children"
          headers = {"Authorization": f"Bearer {ACCESS_TOKEN}"}
          resp = requests.get(url, headers=headers).json()

          years = []
          for item in resp.get("value", []):
            if item["folder"]["childCount"] > 0 and item["name"].isdigit():
                years.append(item["name"])

          print("YEARS FOUND:", years)

          out_dir = os.path.join("history", "awards", "fantasy-fiver")
          os.makedirs(out_dir, exist_ok=True)

          for year in years:
              print(f"Processing {year}...")

              file_url = f"https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football/{year}/FF - 12 Angry Men ({year}).xlsx:/content"
              excel_path = f"FF-{year}.xlsx"

              # Download Excel
              r = requests.get(file_url, headers=headers)
              with open(excel_path, "wb") as f:
                  f.write(r.content)

              # Convert sheet
              df = pd.read_excel(excel_path, sheet_name="Awards - Fantasy Fiver")
              out_path = os.path.join(out_dir, f"{year}.json")
              df.to_json(out_path, orient="records")

              print(f"Saved {out_path}")
          EOF

      - name: Run JSON conversion
        run: python convert_fiver.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
