name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          echo "Raw token response:"
          echo "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Download 2024 Excel from OneDrive
        run: |
          curl -L \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football/2024/FF - 12 Angry Men (2024).xlsx:/content" \
            --output "FF - 12 Angry Men (2024).xlsx"

      - name: Download 2025 Excel from OneDrive
        run: |
          curl -L \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy Football/2025/FF - 12 Angry Men (2025).xlsx:/content" \
            --output "FF - 12 Angry Men (2025).xlsx"

      - name: Create Python script
        run: |
          echo "import pandas as pd" > convert_fiver.py
          echo "import json" >> convert_fiver.py
          echo "import os" >> convert_fiver.py
          echo "" >> convert_fiver.py
          echo "for year in [2024, 2025]:" >> convert_fiver.py
          echo "    xlsx = f'FF - 12 Angry Men ({year}).xlsx'" >> convert_fiver.py
          echo "    df = pd.read_excel(xlsx, sheet_name='Awards - Fantasy Fiver')" >> convert_fiver.py
          echo "    out_dir = os.path.join('history', str(year), 'awards')" >> convert_fiver.py
          echo "    os.makedirs(out_dir, exist_ok=True)" >> convert_fiver.py
          echo "    out_path = os.path.join(out_dir, 'fantasy-fiver.json')" >> convert_fiver.py
          echo "    df.to_json(out_path, orient='records')" >> convert_fiver.py

      - name: Run JSON conversion
        run: python convert_fiver.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
