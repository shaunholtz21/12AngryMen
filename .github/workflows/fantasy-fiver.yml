name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Discover year folders
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football:/children"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          YEARS=$(echo "$RESP" | jq -r '.value[]? 
            | select(.folder != null) 
            | select(.name|test("^[0-9]{4}$")) 
            | .name')

          if [ -z "$YEARS" ]; then
            echo "No year folders found under Fantasy Football"
            exit 1
          fi

          echo "$YEARS" > years.txt

      - name: Download Excel files
        run: |
          YEARS=$(cat years.txt)
          for year in $YEARS; do
            echo "Downloading $year..."

            URL='https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/'"$year"'/FF%20-%2012%20Angry%20Men%20%28'"$year"'%29.xlsx:/content'

            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$URL" \
              --output "FF - 12 Angry Men ($year).xlsx"
          done

      - name: Convert Excel to JSON
        run: |
          python - << 'EOF'
          import os, pandas as pd
          import json

          # Load list of years
          with open("years.txt") as f:
              years = f.read().split()

          # Output directories
          fiver_dir = os.path.join("history", "awards", "fantasy-fiver")
          king_east_dir = os.path.join("history", "awards", "king-east")
          king_west_dir = os.path.join("history", "awards", "king-west")
          iron_bank_dir = os.path.join("history", "awards", "iron-bank")

          os.makedirs(fiver_dir, exist_ok=True)
          os.makedirs(king_east_dir, exist_ok=True)
          os.makedirs(king_west_dir, exist_ok=True)
          os.makedirs(iron_bank_dir, exist_ok=True)

          for year in years:
              xlsx = f"FF - 12 Angry Men ({year}).xlsx"
              print(f"Processing {xlsx}...")

              # ================================
              # FANTASY FIVER
              # ================================
              df = pd.read_excel(xlsx, sheet_name="Awards - Fantasy Fiver")
              df.to_json(os.path.join(fiver_dir, f"{year}.json"), orient="records")

              # ================================
              # KING OF THE EAST (merged cell safe)
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")

                  # Grab the "King of the East" column by header
                  col = sheet["King of the East"]

                  # First non-empty value in that column
                  non_empty = col.dropna()
                  king_east_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""

                  king_json = { "Team": str(king_east_winner).strip() }

                  with open(os.path.join(king_east_dir, f"{year}.json"), "w") as f:
                      json.dump(king_json, f, indent=2)

                  print(f"King of the East JSON written for {year}")

              except Exception as e:
                  print(f"Error generating King of the East for {year}: {e}")

              # ================================
              # KING OF THE WEST (merged cell safe)
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")

                  # Grab the "King of the West" column by header
                  col = sheet["King of the West"]

                  # First non-empty value in that column
                  non_empty = col.dropna()
                  king_west_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""

                  king_json = { "Team": str(king_west_winner).strip() }

                  with open(os.path.join(king_west_dir, f"{year}.json"), "w") as f:
                      json.dump(king_json, f, indent=2)

                  print(f"King of the West JSON written for {year}")

              except Exception as e:
                  print(f"Error generating King of the West for {year}: {e}")

              # ================================
              # IRON BANK (merged cell safe)
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")

                  # Grab the "Iron Bank" column by header
                  col = sheet["Iron Bank"]

              # First non-empty value in that column
              non_empty = col.dropna()
              iron_bank_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""

              iron_json = { "Team": str(iron_bank_winner).strip() }

              with open(os.path.join(iron_bank_dir, f"{year}.json"), "w") as f:
                  json.dump(iron_json, f, indent=2)

              print(f"Iron Bank JSON written for {year}")

          except Exception as e:
              print(f"Error generating Iron Bank for {year}: {e}")

          EOF


      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main