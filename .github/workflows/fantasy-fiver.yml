name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: List Fantasy Football contents
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football:/children"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")
          echo "$RESP" | jq '.value[] | {name, folder, file}'

      - name: Locate Fantasy Football folder
        run: |
          echo "Searching for Fantasy Football folder..."
          API="https://graph.microsoft.com/v1.0/me/drive/root/search(q='Fantasy')"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          echo "$RESP" | jq '.value[] | {name, path: .parentReference.path, id}'

      - name: Search for Fantasy Football folder
        run: |
          echo "Searching entire OneDrive for Fantasy Football..."
          API="https://graph.microsoft.com/v1.0/me/drive/root/search(q='Fantasy')"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          echo "$RESP" | jq '.value[] | {name, path: .parentReference.path, id}'

      - name: Debug env file writes
        run: |
          echo "Checking for env writes..."
          grep -R "\$GITHUB_ENV" -n .github/workflows || echo "No env writes found except token"

      - name: Dump OneDrive folder tree
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root/children"
          echo "Listing root..."
          curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API" | jq '.value[] | {name, folder, parent: .parentReference.path}'

          echo ""
          echo "Recursively listing all folders..."
          NEXT="$API"

          # BFS traversal of the entire OneDrive tree
          while [ -n "$NEXT" ] && [ "$NEXT" != "null" ]; do
            RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$NEXT")
            echo "$RESP" | jq '.value[] | {name, folder, parent: .parentReference.path}'

            NEXT=$(echo "$RESP" | jq -r '."@odata.nextLink"')
          done

      - name: Discover year folders
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football:/children"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          echo "Raw children response:"
          echo "$RESP"

          YEARS=$(echo "$RESP" | jq -r '.value[]? 
            | select(.folder != null) 
            | select(.name|test("^[0-9]{4}$")) 
            | .name')

          if [ -z "$YEARS" ]; then
            echo "No year folders found under Fantasy Football"
            exit 1
          fi

          # Write years to a plain text file, one line or space-separated
          echo "$YEARS" > years.txt

          echo "Years found:"
          cat years.txt

      - name: Download Excel files
        run: |
          YEARS=$(cat years.txt)
          for year in $YEARS; do
            echo "Downloading $year..."

            URL='https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/'"$year"'/FF%20-%2012%20Angry%20Men%20%28'"$year"'%29.xlsx:/content'

            echo "URL: $URL"

            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$URL" \
              --output "FF - 12 Angry Men ($year).xlsx"
          done

      - name: Convert Excel to JSON
        run: |
          python - << 'EOF'
          import os, pandas as pd

          with open("years.txt") as f:
              years = f.read().split()

          out_dir = os.path.join("history", "awards", "fantasy-fiver")
          os.makedirs(out_dir, exist_ok=True)

          for year in years:
              xlsx = f"FF - 12 Angry Men ({year}).xlsx"
              print(f"Processing {xlsx}...")
              df = pd.read_excel(xlsx, sheet_name="Awards - Fantasy Fiver")
              df.to_json(os.path.join(out_dir, f"{year}.json"), orient="records")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

