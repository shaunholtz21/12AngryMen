name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: pip install pandas openpyxl

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          echo "Raw token response:"
          echo "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Download 2024 Excel
        run: |
          curl -L \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/2024/FF%20-%2012%20Angry%20Men%20%282024%29.xlsx:/content" \
            --output "FF - 12 Angry Men (2024).xlsx"

      - name: Download 2025 Excel
        run: |
          curl -L \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/2025/FF%20-%2012%20Angry%20Men%20%282025%29.xlsx:/content" \
            --output "FF - 12 Angry Men (2025).xlsx"

      - name: Convert both years to JSON
        run: |
          python - << 'EOF'
          import pandas as pd
          import json, os

          for year in [2024, 2025]:
              xlsx = f"FF - 12 Angry Men ({year}).xlsx"
              df = pd.read_excel(xlsx, sheet_name="Awards - Fantasy Fiver")

              out_dir = os.path.join("history", "awards", "fantasy-fiver")
              os.makedirs(out_dir, exist_ok=True)

              out_path = os.path.join(out_dir, f"{year}.json")
              df.to_json(out_path, orient="records")

          print("Conversion complete.")
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
