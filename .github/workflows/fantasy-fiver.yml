name: Update Fantasy Fiver

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  update-fiver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl requests

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get OneDrive access token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://login.microsoftonline.com/consumers/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.ONEDRIVE_CLIENT_ID }}" \
            -d "refresh_token=${{ secrets.ONEDRIVE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Discover year folders
        run: |
          API="https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football:/children"
          RESP=$(curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$API")

          YEARS=$(echo "$RESP" | jq -r '.value[]? 
            | select(.folder != null) 
            | select(.name|test("^[0-9]{4}$")) 
            | .name')

          if [ -z "$YEARS" ]; then
            echo "No year folders found under Fantasy Football"
            exit 1
          fi

          echo "$YEARS" > years.txt

      - name: Download Excel files
        run: |
          YEARS=$(cat years.txt)
          for year in $YEARS; do
            echo "Downloading $year..."

            URL='https://graph.microsoft.com/v1.0/me/drive/root:/Fantasy%20Football/'"$year"'/FF%20-%2012%20Angry%20Men%20%28'"$year"'%29.xlsx:/content'

            curl -L \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$URL" \
              --output "FF - 12 Angry Men ($year).xlsx"
          done

      - name: Convert Excel to JSON
        run: |
          python - << 'EOF'
          import os, pandas as pd
          import json

          # Load list of years
          with open("years.txt") as f:
              years = f.read().split()

          # Output directories
          fiver_dir = os.path.join("history", "awards", "fantasy-fiver")
          king_east_dir = os.path.join("history", "awards", "king-east")
          king_west_dir = os.path.join("history", "awards", "king-west")
          iron_bank_dir = os.path.join("history", "awards", "iron-bank")
          punching_bag_dir = os.path.join("history", "awards", "punching-bag")
          lms_dir = os.path.join("history", "awards", "last-man-standing")
          golden_ticket_dir = os.path.join("history", "awards", "golden-ticket")
          reach_dir = os.path.join("history", "awards", "reach-around")

          os.makedirs(fiver_dir, exist_ok=True)
          os.makedirs(king_east_dir, exist_ok=True)
          os.makedirs(king_west_dir, exist_ok=True)
          os.makedirs(iron_bank_dir, exist_ok=True)
          os.makedirs(punching_bag_dir, exist_ok=True)
          os.makedirs(lms_dir, exist_ok=True)
          os.makedirs(golden_ticket_dir, exist_ok=True)
          os.makedirs(reach_dir, exist_ok=True)

          for year in years:
              xlsx = f"FF - 12 Angry Men ({year}).xlsx"
              print(f"Processing {xlsx}...")

              # ================================
              # FANTASY FIVER
              # ================================
              df = pd.read_excel(xlsx, sheet_name="Awards - Fantasy Fiver")
              df.to_json(os.path.join(fiver_dir, f"{year}.json"), orient="records")

              # ================================
              # KING OF THE EAST
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["King of the East"]
                  non_empty = col.dropna()
                  king_east_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  king_json = { "Team": str(king_east_winner).strip() }

                  with open(os.path.join(king_east_dir, f"{year}.json"), "w") as f:
                      json.dump(king_json, f, indent=2)

                  print(f"King of the East JSON written for {year}")

              except Exception as e:
                  print(f"Error generating King of the East for {year}: {e}")

              # ================================
              # KING OF THE WEST
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["King of the West"]
                  non_empty = col.dropna()
                  king_west_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  king_json = { "Team": str(king_west_winner).strip() }

                  with open(os.path.join(king_west_dir, f"{year}.json"), "w") as f:
                      json.dump(king_json, f, indent=2)

                  print(f"King of the West JSON written for {year}")

              except Exception as e:
                  print(f"Error generating King of the West for {year}: {e}")

              # ================================
              # IRON BANK
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["Iron Bank"]
                  non_empty = col.dropna()
                  iron_bank_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  iron_json = { "Team": str(iron_bank_winner).strip() }

                  with open(os.path.join(iron_bank_dir, f"{year}.json"), "w") as f:
                      json.dump(iron_json, f, indent=2)

                  print(f"Iron Bank JSON written for {year}")

              except Exception as e:
                  print(f"Error generating Iron Bank for {year}: {e}")

              # ================================
              # PUNCHING BAG (merged cell safe)
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["Punching Bag"]
                  non_empty = col.dropna()
                  punching_bag_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  punching_json = { "Team": str(punching_bag_winner).strip() }

                  with open(os.path.join(punching_bag_dir, f"{year}.json"), "w") as f:
                      json.dump(punching_json, f, indent=2)

                  print(f"Punching Bag JSON written for {year}")

              except Exception as e:
                  print(f"Error generating Punching Bag for {year}: {e}")
                  
              # ================================
              # GOLDEN TICKET
              # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["Golden Ticket"]
                  non_empty = col.dropna()
                  golden_ticket_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  golden_json = { "Team": str(golden_ticket_winner).strip() }

                  with open(os.path.join(golden_ticket_dir, f"{year}.json"), "w") as f:
                      json.dump(golden_json, f, indent=2)

                  print(f"Golden Ticket JSON written for {year}")

              except Exception as e:
                  print(f"Error generating Golden Ticket for {year}: {e}")
                  
                  # ================================
                  # REACH AROUND
                  # ================================
              try:
                  sheet = pd.read_excel(xlsx, sheet_name="Season Awards")
                  col = sheet["Reach Around"]
                  non_empty = col.dropna()
                  reach_winner = non_empty.iloc[0] if len(non_empty) > 0 else ""
                  reach_json = { "Team": str(reach_winner).strip() }

                  with open(os.path.join(reach_dir, f"{year}.json"), "w") as f:
                      json.dump(reach_json, f, indent=2)

                  print(f"Reach Around JSON written for {year}")

              except Exception as e:
                  print(f"Error generating Reach Around for {year}: {e}")
                  
              # ================================
              # LAST MAN STANDING (eliminations)
              # ================================
              try:
                  sheet = pd.read_excel(
                      xlsx,
                      sheet_name="Awards - Last Man Standing",
                      skiprows=5
                  )

                  weeks = sheet.iloc[:, 0]
                  teams = sheet.iloc[:, 1]
                  scores = sheet.iloc[:, 2]

                  lms_data = []
                  for w, t, s in zip(weeks, teams, scores):
                      # Skip blank rows
                      if pd.isna(w) or pd.isna(t):
                          continue

                      # Convert week to integer even if it's text like "Week 1"
                      if isinstance(w, str):
                          import re
                          match = re.search(r"\d+", w)
                          if match:
                              w = int(match.group())
                          else:
                              continue  # skip if no digits found
                      else:
                          w = int(w)

                      lms_data.append({
                          "Week": w,
                          "Team": str(t).strip(),
                          "Score": float(s) if not pd.isna(s) else None
                      })

                  with open(os.path.join(lms_dir, f"{year}.json"), "w") as f:
                      json.dump(lms_data, f, indent=2)

                  print(f"Last Man Standing JSON written for {year}")

              except Exception as e:
                  print(f"Error generating Last Man Standing for {year}: {e}")
                  
              # ================================
              # LAST MAN STANDING (team list)
              # ================================
              try:
                  stats = pd.read_excel(
                      xlsx,
                      sheet_name="Stats",
                      usecols=[0],      # Column A only
                      header=1        # Row 2 is header, row 3 is first team
                  )

                  # Drop blank rows
                  teams = stats.iloc[:, 0].dropna()

                  # Convert to clean list of strings
                  team_list = [str(t).strip() for t in teams]

                  with open(os.path.join(lms_dir, f"{year}-teams.json"), "w") as f:
                      json.dump(team_list, f, indent=2)

                  print(f"LMS team list JSON written for {year}")

              except Exception as e:
                  print(f"Error generating LMS team list for {year}: {e}")

          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add history/
          git commit -m "Update Fantasy Fiver data" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
