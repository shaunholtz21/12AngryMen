name: Auto‑Update Drafts Index

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate drafts index.json
        run: |
          DRAFT_DIR="history/drafts"
          OUTPUT_FILE="$DRAFT_DIR/index.json"

          echo "{" > $OUTPUT_FILE
          echo '  "drafts": [' >> $OUTPUT_FILE

          # Find all YYYY-draft-recap.html files and sort by year descending
          FILES=$(ls $DRAFT_DIR/*-draft-recap.html 2>/dev/null | sort -t'/' -k3 -r)

          COUNT=0
          TOTAL=$(echo "$FILES" | wc -l)

          for FILE in $FILES; do
            BASENAME=$(basename "$FILE")
            COUNT=$((COUNT+1))

            if [ $COUNT -eq $TOTAL ]; then
              echo "    \"$BASENAME\"" >> $OUTPUT_FILE
            else
              echo "    \"$BASENAME\"," >> $OUTPUT_FILE
            fi
          done

          echo "  ]" >> $OUTPUT_FILE
          echo "}" >> $OUTPUT_FILE

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          if ! git diff --quiet; then
            git add history/drafts/index.json
            git commit -m "Auto-update drafts index.json"
            git push
          else
            echo "No changes to commit"
          fi
