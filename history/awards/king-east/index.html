<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King of the East</title>

  <link rel="stylesheet" href="/style.css" />
</head>

<body>

  <div class="page-container">

    <h1>👑 King of the East</h1>
    <p class="subtitle">
      Awarded annually to the team that finishes atop the East Division standings.
    </p>

    <div id="awards"></div>

  </div>

  <script>
    async function loadAwards() {
      const container = document.getElementById("awards");

      // Fetch list of JSON files in the folder
      const response = await fetch("/history/awards/king-east/");
      const text = await response.text();

      // Extract filenames ending in .json
      const files = [...text.matchAll(/href="(.*?\.json)"/g)].map(m => m[1]);

      // Sort newest year first
      files.sort((a, b) => b.localeCompare(a));

      for (const file of files) {
        const year = file.replace(".json", "");
        const data = await fetch(`/history/awards/king-east/${file}`).then(r => r.json());

        container.innerHTML += `
          <div class="award-year-block" style="
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-soft);
          ">
            <h2 style="margin: 0 0 1rem 0;">
              ${year} King of the East
            </h2>

            <div style="
              background: var(--accent-soft);
              padding: 0.75rem 1rem;
              border-radius: 6px;
              margin-bottom: 1rem;
              font-weight: 600;
              color: var(--accent);
            ">
              East Division Champion
            </div>

            <div style="
              font-size: 1.25rem;
              font-weight: 700;
              padding: 0.5rem 0;
              color: var(--text);
            ">
              ${data.Team || "—"}
            </div>
          </div>
        `;
      }
    }

    loadAwards();
  </script>

</body>
</html>
