<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Award History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

  <!-- BACK LINK -->
  <div style="width:100%; padding:1.5rem 1rem 0;">
    <a href="../index.html" style="
      color:var(--accent);
      font-weight:600;
      text-decoration:none;
    ">
      ← Back to League History
    </a>
  </div>

  <div class="shell" style="padding-top:1rem;">

    <!-- ================================
         HEADER
         ================================ -->
    <section class="card card-soft" style="margin-bottom:2rem;">
      <div class="card-header">
        <h1 class="card-title">🏆 Award History</h1>
        <div class="card-meta">All-time winners for every league award</div>
      </div>

      <div class="card-body">
        <p class="hero-sub" style="margin-bottom:1rem;">
          Explore the full history of every award in the league — from season-long dominance to draft‑day chaos.
        </p>

        <a href="recap/2025/index.html" style="
          display:inline-block;
          margin-top:0.5rem;
          padding:0.6rem 1rem;
          background:var(--accent);
          color:#fff;
          border-radius:6px;
          font-weight:600;
          text-decoration:none;
        ">
          View 2025 Season Recap →
        </a>
      </div>
    </section>

    <!-- ================================
         AWARD LIST
         ================================ -->
    <section style="margin-top: 2rem;">
      <h2 class="section-title">Awards</h2>

      <div style="
        background: rgba(255, 255, 255, 0.03);
        padding: 1.25rem;
        border-radius: 0.9rem;
        border: 1px solid var(--border-subtle);
        margin-top: 1rem;
      ">
        <div id="awards-container" class="card-grid"></div>
      </div>
    </section>
  </div>
<script>
async function loadAwards() {
  const container = document.getElementById("awards-container");
  if (!container) return;

  try {
    const indexRes = await fetch("/12AngryMen/history/awards/index.json");
    const indexData = await indexRes.json();

    for (const award of indexData.awards) {
      const url = `/12AngryMen/history/awards/${award.folder}/index.html`;
      const title = award.title || award.folder;

      const card = document.createElement("article");
      card.className = "card card-soft";
      card.style.borderLeft = "4px solid var(--accent)";

      card.innerHTML = `
        <div class="card-header">
          <h3 class="card-title">${title}</h3>
          <div class="card-meta">Award</div>
        </div>
        <div class="card-body">
          <p>Explore the history of the ${title}.</p>
          <a href="${url}" class="card-link">View Award →</a>
        </div>
      `;

      container.appendChild(card);
    }

  } catch (err) {
    console.error("Error loading awards:", err);
  }
}

loadAwards();
</script>

</body>
</html>
