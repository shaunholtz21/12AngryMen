name: Update Recap Manifest

on:
  push:
    paths:
      - '202*/**.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build recap manifest
        run: |
          echo "{" > recaps.json
          first=true
          for season in 202*/; do
            season=${season%/}
            if [ "$first" = false ]; then echo "," >> recaps.json; fi
            first=false
            echo -n "\"$season\": [" >> recaps.json
            weeks=$(ls $season/week*.html 2>/dev/null | sed 's/.*\/\(week[0-9]*\)\.html/\1/' | sort)
            wfirst=true
            for w in $weeks; do
              if [ "$wfirst" = false ]; then echo -n ", " >> recaps.json; fi
              wfirst=false
              echo -n "\"$w\"" >> recaps.json
            done
            echo -n "]" >> recaps.json
          done
          echo "}" >> recaps.json

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update recap manifest"
          file_pattern: recaps.json
